name: Build Gradle & Check Ktlint

on: [ push, pull_request ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin' # or 'zulu', 'adopt', etc.
          java-version: '21'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Ktlint Check
        run: ./gradlew ktlintCheck

      - name: Upload Ktlint Report
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: ktlint-report
          path: build/reports/ktlint

      - name: Build with Gradle
        run: ./gradlew build writeVersion

      - name: Read version from file
        id: read_version
        run: echo "VERSION=$(cat build/version.txt)" >> $GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: blntournament-${{ env.VERSION }}.jar
          path: build/libs/blntournament-${{ env.VERSION }}.jar