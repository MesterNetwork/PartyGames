items:
  # Combat Items
  stone_sword:
    id: stone_sword
    name: <gray>Stone Sword
    lore:
      - <white>A basic, but trustworthy stone sword.
      - <white>9 out of 10 cavemen recommend it.
    price: 8
    slot: 0
    group: sword
    category: combat
  iron_sword:
    id: iron_sword
    name: <white>Iron Sword
    lore:
      - <white>A sharp and durable iron sword.
      - <white>10 out of 10 blacksmiths recommend it.
    price: 12
    slot: 1
    group: sword
    category: combat
  diamond_sword:
    id: diamond_sword
    name: <aqua>Diamond Sword
    lore:
      - <white>A powerful and enduring diamond sword.
      - <white>A favorite among treasure hunters.
    price: 16
    slot: 2
    group: sword
    category: combat
  netherite_sword:
    id: netherite_sword
    name: <dark_purple>Netherite Sword
    lore:
      - <white>The strongest sword in existence, imbued with ancient power.
      - <white>Only the bravest wield this mighty blade.
    price: 20
    slot: 3
    group: sword
    category: combat

  shield:
    id: shield
    name: <gray>Shield
    lore:
      - <white>A basic shield, good for blocking attacks.
      - <white>Has a 1.5 second cooldown after use.
    price: 3
    slot: 4
    group: offhand
    category: combat

  knockback_stick:
    id: stick
    name: <yellow>Knockback Stick
    lore:
      - <white>A stick with Knockback II.
      - <white>Great if you want to be annoying.
    price: 5
    slot: 5
    category: combat

  fire_aspect:
    id: enchanted_book
    name: <yellow>Fire Aspect
    lore:
      - <white>Let the world burn!
    price: 10
    slot: 6
    category: combat

  sharpness_3:
    id: enchanted_book
    name: <yellow>Sharpness III
    lore:
      - <white>Increases your damage by 1<red>♥
      - <white>May cause a bit of pain.
    price: 12
    slot: 7
    group: sharpness
    category: combat
  sharpness_5:
    id: enchanted_book
    name: <yellow>Sharpness V
    lore:
      - <white>Increases your damage by 1.5<red>♥
      - <red><bold>OUCH!
    price: 18
    slot: 8
    group: sharpness
    category: combat

  chainmail_armor:
    id: chainmail_chestplate
    name: <gray>Chainmail Armor
    lore:
      - <white>A basic chainmail armor.
      - <white>Good for blocking attacks.
    price: 8
    slot: 9
    group: armor
    category: combat
  iron_armor:
    id: iron_chestplate
    name: <white>Iron Armor
    lore:
      - <white>A basic iron armor.
      - <white>Good for blocking attacks.
    price: 12
    slot: 10
    group: armor
    category: combat
  diamond_armor:
    id: diamond_chestplate
    name: <aqua>Diamond Armor
    lore:
      - <white>A basic diamond armor.
      - <white>Good for blocking attacks.
    price: 24
    slot: 11
    group: armor
    category: combat
  netherite_armor:
    id: netherite_chestplate
    name: <dark_purple>Netherite Armor
    lore:
      - <white>The strongest armor in existence, imbued with ancient power.
      - <white>Only the bravest wield this mighty armor.
    price: 36
    slot: 12
    group: armor
    category: combat

  thorns:
    id: enchanted_book
    name: <yellow>Thorns
    lore:
      - <white>Damages anyone who attacks you.
      - <white>Maybe don't use it on yourself.
    price: 14
    slot: 13
    category: combat
  protection_i:
    id: enchanted_book
    name: <yellow>Protection I
    lore:
      - <white>Gives you a 16% damage reduction.
    price: 8
    slot: 14
    group: protection
    category: combat
  protection_ii:
    id: enchanted_book
    name: <yellow>Protection II
    lore:
      - <white>Gives you a 32% damage reduction.
    price: 16
    slot: 15
    group: protection
    category: combat
  protection_iii:
    id: enchanted_book
    name: <yellow>Protection III
    lore:
      - <white>Gives you a 48% damage reduction.
    price: 24
    slot: 16
    group: protection
    category: combat
  protection_iv:
    id: enchanted_book
    name: <yellow>Protection IV
    lore:
      - <white>Gives you a 64% damage reduction.
    price: 32
    slot: 17
    group: protection
    category: combat

  bow:
    id: bow
    name: <yellow>Bow
    lore:
      - <white>A bow that shoots arrows.
      - <white>Comes with a regenerating arrow.
    price: 8
    slot: 18
    category: combat

  arrow_1:
    id: arrow
    name: <yellow>Arrow
    lore:
      - <white>A basic arrow.
      - <white>Regenerates after 3 seconds.
    price: 3
    slot: 19
    group: arrow
    category: combat
  arrow_2:
    id: arrow
    name: <yellow>2x Arrow
    lore:
      - <white>2 arrows.
      - <white>Regenerates after 3 seconds.
    price: 6
    slot: 20
    group: arrow
    amount: 2
    category: combat
  arrow_3:
    id: arrow
    name: <yellow>3x Arrow
    lore:
      - <white>3 arrows.
      - <white>Regenerates after 3 seconds.
    price: 9
    slot: 21
    group: arrow
    amount: 3
    category: combat

  flame:
    id: enchanted_book
    name: <yellow>Flame
    lore:
      - <white>Didn't they use flaming arrows in the past?
    price: 10
    slot: 22
    category: combat
  power_i:
    id: enchanted_book
    name: <yellow>Power I
    lore:
      - <white>Increases your damage by 50%, kinda hurts.
    price: 8
    slot: 23
    group: power
    category: combat
  power_ii:
    id: enchanted_book
    name: <yellow>Power II
    lore:
      - <white>Increases your damage by 75%.
      - <white>Use it well, and you can one-shot someone.
    price: 12
    slot: 24
    group: power
    category: combat
  punch_i:
    id: enchanted_book
    name: <yellow>Punch I
    lore:
      - <white>Send them flying!
    price: 6
    slot: 25
    group: punch
    category: combat
  punch_ii:
    id: enchanted_book
    name: <yellow>Punch II
    lore:
      - <white>Can't touch this!
    price: 10
    slot: 26
    group: punch
    category: combat

  # Utility Items
  golden_apple_1:
    id: golden_apple
    name: <gold>Golden Apple
    lore:
      - <white>A single golden apple.
      - <white>It's a delicious treat!
    price: 2
    slot: 0
    group: gap
    category: utility
  golden_apple_2:
    id: golden_apple
    name: <gold>2x Golden Apple
    lore:
      - <white>Two golden apples.
      - <white>Now we're talking!
    price: 4
    slot: 1
    group: gap
    amount: 2
    category: utility
  golden_apple_3:
    id: golden_apple
    name: <gold>3x Golden Apple
    lore:
      - <white>Three golden apples.
      - <white>Enough regen for the whole family!
    price: 6
    slot: 2
    group: gap
    amount: 3
    category: utility
  golden_apple_inf:
    id: enchanted_golden_apple
    name: <rainbow>Infinite Golden Apple</rainbow>
    lore:
      - <white>Infinite golden apples.
      - <white>Regenerates every <yellow>10</yellow> seconds!
    price: 14
    slot: 3
    group: gap
    category: utility

  totem_of_undying:
    id: totem_of_undying
    name: <green>Totem of Undying
    lore:
      - <white>A totem that saves you from one death.
    price: 15
    slot: 7
    amount: 1
    group: offhand
    category: utility

  milk:
    id: milk_bucket
    name: <yellow>Milk Bucket
    lore:
      - <white>A bucket of milk.
      - <white>Removes all potion effects.
    price: 5
    slot: 8
    amount: 1
    category: utility

  oak_planks:
    id: oak_planks
    name: <gray>64x Oak Plank
    lore:
      - <white>A basic oak plank.
      - <white>Good for building.
    price: 3
    slot: 9
    amount: 64
    category: utility

  flint_and_steel:
    id: flint_and_steel
    name: <gray>Flint and Steel
    lore:
      - <white>A flint and steel, the same thing that ooga-booga used.
      - <white>Great if you want to get arrested for arson.
    price: 5
    slot: 10
    amount: 1
    category: utility

  fishing_rod:
    id: fishing_rod
    name: <yellow>Fishing Rod
    lore:
      - <white>A fishing rod, great for fishing.
      - <white>But I think you'll use it to pull people towards you.
    price: 4
    slot: 11
    amount: 1
    category: utility

  fireball:
    id: fire_charge
    name: <red>Fireball
    lore:
      - <white>A fireball, great for throwing at people.
      - <white>Just don't burn down the whole place, okay?
    price: 4
    slot: 12
    amount: 1
    group: fireball
    category: utility
  fireball_2:
    id: fire_charge
    name: <red>2x Fireball
    lore:
      - <white>Now with double the combustion.
      - <white>Because one fireball isn't annoying enough.
    price: 8
    slot: 13
    amount: 2
    group: fireball
    category: utility
  fireball_3:
    id: fire_charge
    name: <red>3x Fireball
    lore:
      - <white>You’ve officially entered the chaos bracket.
      - <white>Great for clearing bridges, friendships optional.
    price: 12
    slot: 14
    amount: 3
    group: fireball
    category: utility

  tnt:
    id: tnt
    name: <red>TNT
    lore:
      - <white>For when subtlety just isn't your thing.
      - '<white>Warning: May attract unwanted attention.'
    price: 4
    slot: 15
    amount: 1
    group: tnt
    category: utility
  tnt_2:
    id: tnt
    name: <red>2x TNT
    lore:
      - <white>Double the boom, double the bad decisions.
      - <white>You're not here to make friends, are you?
    price: 8
    slot: 16
    amount: 2
    group: tnt
    category: utility
  tnt_3:
    id: tnt
    name: <red>3x TNT
    lore:
      - <white>A demolition plan disguised as strategy.
      - <white>They’ll never rebuild in time.
    price: 12
    slot: 17
    amount: 3
    group: tnt
    category: utility

  ender_pearl:
    id: ender_pearl
    name: <yellow>Ender Pearl
    lore:
      - <white>An ender pearl, great for teleporting.
      - <white>Just don't break the space-time continuum, please?
    price: 6
    slot: 18
    amount: 1
    group: ender_pearl
    category: utility
  ender_pearl_2:
    id: ender_pearl
    name: <yellow>2x Ender Pearl
    lore:
      - <white>Two ender pearls, great for teleporting twice I guess.
      - <white>Moderately annoying to your enemies.
    price: 11
    slot: 19
    amount: 2
    group: ender_pearl
    category: utility
  ender_pearl_3:
    id: ender_pearl
    name: <yellow>3x Ender Pearl
    lore:
      - <white>Three ender pearls, practically a new transportation system.
      - <white>Oh right, I guess it does have a cooldown.
    price: 16
    slot: 20
    amount: 3
    group: ender_pearl
    category: utility
  ender_pearl_4:
    id: ender_pearl
    name: <yellow>4x Ender Pearl
    lore:
      - <white>Basically an Enderman at this point.
      - <white>Do you even want to fight?
    price: 21
    slot: 21
    amount: 4
    group: ender_pearl
    category: utility

  snowball:
    id: snowball
    name: <white>16x Snowball
    lore:
      - <white>A snowball, great for throwing at people.
      - <white>You can definitely lose friends with this.
    price: 2
    slot: 22
    amount: 16
    category: utility

  # Potions
  splash_healing_3:
    id: splash_potion
    name: <light_purple>3x Splash Healing I
    lore:
      - <white>Heals 2 <red>♥</red> instantly.
      - <white>Great for quick fixes and bad decisions.
    price: 5
    slot: 0
    amount: 3
    group: splash_healing
    category: potion

  splash_healing_5:
    id: splash_potion
    name: <light_purple>5x Splash Healing I
    lore:
      - <white>Heals 2 <red>♥</red> instantly.
      - <white>Enough to patch a party-wide disaster.
    price: 8
    slot: 1
    amount: 5
    group: splash_healing
    category: potion

  splash_healing_7:
    id: splash_potion
    name: <light_purple>7x Splash Healing I
    lore:
      - <white>Heals 2 <red>♥</red> instantly.
      - <white>Why stop panicking when you can heal mid-scream?
    price: 11
    slot: 2
    amount: 7
    group: splash_healing
    category: potion

  splash_healing_ii_3:
    id: splash_potion
    name: <light_purple>3x Splash Healing II
    lore:
      - <white>Heals 4 <red>♥</red> instantly.
      - <white>Basically a medical airstrike.
    price: 9
    slot: 3
    amount: 3
    group: splash_healing_ii
    category: potion

  splash_healing_ii_5:
    id: splash_potion
    name: <light_purple>5x Splash Healing II
    lore:
      - <white>Heals 4 <red>♥</red> instantly.
      - <white>Your enemies hate this one simple trick.
    price: 14
    slot: 4
    amount: 5
    group: splash_healing_ii
    category: potion

  splash_healing_ii_7:
    id: splash_potion
    name: <light_purple>7x Splash Healing II
    lore:
      - <white>Heals 4 <red>♥</red> instantly.
      - <white>May cause extreme survivability.
    price: 19
    slot: 5
    amount: 7
    group: splash_healing_ii
    category: potion

  regen_ii_2:
    id: potion
    name: <light_purple>2x Potion of Regeneration II
    lore:
      - <white>Restores 2 <red>♥</red> every 5 seconds.
      - <white>Slow but steady wins... maybe.
    price: 6
    slot: 6
    amount: 2
    group: regen_ii
    category: potion

  regen_ii_4:
    id: potion
    name: <light_purple>4x Potion of Regeneration II
    lore:
      - <white>Restores 2 <red>♥</red> every 5 seconds.
      - <white>Patience is a virtue. Healing is a luxury.
    price: 10
    slot: 7
    amount: 4
    group: regen_ii
    category: potion

  regen_v:
    id: potion
    name: <light_purple>2x Potion of Regeneration V
    lore:
      - <white>Restores 3 <red>♥</red> per second.
      - <white>Certified LEGA (Liquid Enchanted Golden Apples).
    price: 14
    slot: 8
    amount: 2
    category: potion

  speed_potion:
    id: potion
    name: <yellow>3x Potion of Speed II
    lore:
      - <white>Speeds you up for 15 seconds.
      - <white>Perfect for catching goons.
    price: 6
    slot: 9
    amount: 3
    category: potion

  jump_potion:
    id: potion
    name: <yellow>3x Potion of Jump Boost IV
    lore:
      - <white>Turns you into a rabbit for 20 seconds.
      - <white>Boing-boing-boing!
    price: 6
    slot: 10
    amount: 3
    category: potion

  # Miscellaneous Items
  tracker:
    id: compass
    name: <yellow>Tracker
    lore:
      - <white>Right click to point to the nearest player.
      - <white>Has a 5-second cooldown and alerts the tracked player.
    price: 6
    slot: 0
    category: miscellaneous

  steal_perk:
    id: bundle
    name: <yellow>Steal Perk
    lore:
      - <white>You will get every item from the players you kill.
      - <white>The perk can only be used once. Very high risk, high reward.
    price: 20
    slot: 1
    group: perk
    category: miscellaneous
  heal_perk:
    id: red_dye
    name: <yellow>Heal Perk
    lore:
      - <white>You will heal to full health when you kill a player.
      - <white>The perk is kept after use.
    price: 7
    slot: 2
    group: perk
    category: miscellaneous
  double_jump:
    id: rabbit_foot
    name: <yellow>Double Jump
    lore:
      - <white>Gives you the ability to jump twice.
      - <white>The perk is kept after use and has a 3 second cooldown.
    price: 10
    slot: 3
    group: perk
    category: miscellaneous
